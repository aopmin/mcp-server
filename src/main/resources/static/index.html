<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI + Ollama + MCP 智能聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            padding: 20px 24px;
            color: white;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #4CAF50;
            animation: pulse 2s infinite;
        }

        .status-indicator.thinking {
            background-color: #FF9800;
            animation: pulse 0.5s infinite;
        }

        .status-indicator.error {
            background-color: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.system .message-content {
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #message-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-primary, .btn-secondary {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- 头部 -->
    <div class="chat-header">
        <h1>🤖 AI 智能助手</h1>
        <div class="status-bar">
            <span class="status-indicator" id="status-indicator"></span>
            <span id="status-text">已就绪</span>
        </div>
    </div>

    <!-- 聊天消息区域 -->
    <div class="chat-messages" id="chat-messages">
        <div class="message system">
            <div class="message-content">
                你好！我是 AI 智能助手，已接入以下工具能力：<br>
                📦 订单查询 - 根据订单号查询状态<br>
                ⏰ 获取服务器时间<br>
                🧮 计算器 - 支持数学运算<br>
                请输入你的问题开始对话！
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="chat-input-container">
        <textarea id="message-input"
                  placeholder="输入你的问题... (Shift+Enter 换行, Enter 发送)"
                  rows="3"></textarea>
        <div class="button-group">
            <button id="send-btn" class="btn-primary">发送 ✨</button>
            <button id="clear-btn" class="btn-secondary">清空对话</button>
        </div>
    </div>
</div>

<script>
    // 聊天交互逻辑 - 与后端 /api/chat 接口通信
    const API_URL = '/api/chat';

    // DOM 元素
    const messagesContainer = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-btn');
    const clearButton = document.getElementById('clear-btn');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');

    let isWaitingForResponse = false;

    function updateStatus(status, text) {
        statusIndicator.className = 'status-indicator';
        if (status === 'thinking') {
            statusIndicator.classList.add('thinking');
            statusText.textContent = text || 'AI 正在思考...';
        } else if (status === 'error') {
            statusIndicator.classList.add('error');
            statusText.textContent = text || '连接错误';
        } else {
            statusText.textContent = text || '已就绪';
        }
    }

    function addMessage(content, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        // 支持简单 Markdown 样式
        let formattedContent = content;
        formattedContent = formattedContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formattedContent = formattedContent.replace(/\n/g, '<br>');
        contentDiv.innerHTML = formattedContent;

        messageDiv.appendChild(contentDiv);
        messagesContainer.appendChild(messageDiv);

        // 滚动到底部
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addLoadingMessage() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant';
        loadingDiv.id = 'loading-message';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

        loadingDiv.appendChild(contentDiv);
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeLoadingMessage() {
        const loading = document.getElementById('loading-message');
        if (loading) loading.remove();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message || isWaitingForResponse) return;

        // 清空输入框
        messageInput.value = '';

        // 添加用户消息
        addMessage(message, 'user');

        // 设置等待状态
        isWaitingForResponse = true;
        sendButton.disabled = true;

        // 添加加载动画
        addLoadingMessage();

        // 更新状态为思考中
        updateStatus('thinking', 'AI 正在调用工具并生成回答...');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            // 移除加载动画
            removeLoadingMessage();

            // 添加 AI 回复
            addMessage(data.reply, 'assistant');

            updateStatus('ready', '已就绪');

        } catch (error) {
            console.error('Error:', error);
            removeLoadingMessage();
            addMessage('抱歉，发生了错误: ' + error.message, 'assistant');
            updateStatus('error', '连接失败');

            // 3秒后恢复状态
            setTimeout(() => {
                if (statusIndicator.classList.contains('error')) {
                    updateStatus('ready', '已就绪');
                }
            }, 3000);
        } finally {
            isWaitingForResponse = false;
            sendButton.disabled = false;
            messageInput.focus();
        }
    }

    function clearChat() {
        // 保留第一条系统消息
        const messages = messagesContainer.querySelectorAll('.message:not(.system)');
        messages.forEach(msg => msg.remove());

        addMessage('对话已清空，有什么我可以帮你的吗？', 'system');
    }

    // 事件绑定
    sendButton.addEventListener('click', sendMessage);
    clearButton.addEventListener('click', clearChat);

    // 回车发送（Shift+Enter 换行）
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
